<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고1 학생 상담카드</title>
<script>
// ══════════════════════════════════════════
const API_URL        = 'https://script.google.com/macros/s/AKfycbygPe-OdVqtQEUHvM-j_hP1Vm8YX1mbMGsrBY8n2Qgg710yLkobNjxwgCvJzM6D_3vBrg/exec';
const ALLOWED_DOMAIN = 'osang.hs.kr';
// ══════════════════════════════════════════

// 로그인 체크
(function() {
  const user = sessionStorage.getItem('gs_user');
  if (!user) { location.href = 'index.html'; return; }
  try {
    const u = JSON.parse(user);
    if (!u.email || !u.email.endsWith('@' + ALLOWED_DOMAIN)) {
      sessionStorage.clear(); location.href = 'index.html';
    }
  } catch(e) { sessionStorage.clear(); location.href = 'index.html'; }
})();

// 담임 권한 체크 (상담카드는 담임/학년부장/관리자만)
let _teacher = null;
let _user    = null;
try { _teacher = JSON.parse(sessionStorage.getItem('gs_teacher') || 'null'); } catch(e) {}
try { _user    = JSON.parse(sessionStorage.getItem('gs_user')    || 'null'); } catch(e) {}

(function() {
  const t = _teacher;
  if (!t) return; // 권한 없으면 일단 통과 (API 로드 후 재확인)
  if (!t.isAdmin && !t.isGradeHead && !t.isHomeroom) {
    document.addEventListener('DOMContentLoaded', () => {
      document.body.innerHTML = `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f1117;font-family:sans-serif">
          <div style="background:#1a1d2e;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px;text-align:center;max-width:360px">
            <div style="font-size:48px;margin-bottom:16px">🔒</div>
            <div style="font-size:20px;font-weight:800;color:#f0f2ff;margin-bottom:8px">접근 권한 없음</div>
            <div style="font-size:13px;color:#9aa0c4;margin-bottom:24px;line-height:1.6">
              학생 상담카드는 담임 선생님,<br>학년부장, 관리자만 접근할 수 있습니다.
            </div>
            <a href="index.html" style="display:inline-block;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;text-decoration:none;border-radius:10px;padding:10px 24px;font-size:14px;font-weight:700">홈으로 돌아가기</a>
          </div>
        </div>`;
    });
  }
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4ff;
  --surface:#ffffff;
  --surface2:#e8eeff;
  --border:#c5ceee;
  --border2:#a8b4e8;
  --text:#1a1d3a;
  --text2:#4a5080;
  --text3:#8890b8;
  --accent:#3d5af1;
  --accent-dark:#2641d4;
  --accent-bg:#eaedff;
  --green:#0a8c5f;
  --green-bg:#d6f5e8;
  --green-dark:#066040;
  --blue:#1a6fd4;
  --blue-bg:#daeeff;
  --amber:#b06a00;
  --amber-bg:#fff0cc;
  --red:#c0302a;
  --red-bg:#ffe4e2;
  --purple:#6a3fcf;
  --purple-bg:#ede5ff;
  --teal:#0080a0;
  --teal-bg:#d4f0f8;
  --radius:12px;--radius-sm:8px;
  font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:stretch}

/* ── LAYOUT ── */
.app{display:flex;width:100%;min-height:100vh}
.sidebar{width:230px;min-width:230px;background:#1e2248;border-right:none;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden;box-shadow:4px 0 20px rgba(30,34,72,.18)}
.main{flex:1;overflow-y:auto;min-height:100vh}

/* ── SIDEBAR ── */
.sb-head{padding:20px 14px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{font-size:13px;font-weight:800;color:#fff;letter-spacing:.04em;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.sb-logo::before{content:'🎓';font-size:16px}
.add-btn{width:100%;padding:9px;font-size:12px;font-weight:700;border:2px solid rgba(255,255,255,.25);border-radius:var(--radius-sm);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;transition:all .18s;letter-spacing:.02em}
.add-btn:hover{background:var(--accent);border-color:var(--accent);box-shadow:0 4px 14px rgba(61,90,241,.5)}
.sb-list{flex:1;overflow-y:auto;padding:8px 8px}
.sb-list::-webkit-scrollbar{width:4px}
.sb-list::-webkit-scrollbar-track{background:transparent}
.sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}

.st-row{margin-bottom:2px}
.st-btn{width:100%;text-align:left;padding:9px 11px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid transparent;background:transparent;display:flex;align-items:center;gap:10px;transition:all .15s}
.st-btn:hover{background:rgba(255,255,255,.1)}
.st-btn.active{background:rgba(61,90,241,.35);border-color:rgba(61,90,241,.6)}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}
.st-info{flex:1;overflow:hidden}
.st-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-cls{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}

.sub-tabs{display:none;padding:4px 0 6px 52px;gap:3px;flex-direction:column}
.st-row.open .sub-tabs{display:flex}
.stab{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid transparent;color:rgba(255,255,255,.55);background:transparent;text-align:left;transition:all .15s}
.stab:hover{color:#fff;background:rgba(255,255,255,.12)}
.stab.sel-교과{background:#3d5af1;color:#fff;border-color:rgba(255,255,255,.2);box-shadow:0 2px 10px rgba(61,90,241,.4)}
.stab.sel-비교과{background:#0a8c5f;color:#fff;border-color:rgba(255,255,255,.2);box-shadow:0 2px 10px rgba(10,140,95,.4)}

/* TOOLBAR */
.sb-toolbar{display:flex;flex-direction:column;gap:3px;margin-top:8px}
.tb-btn{width:100%;padding:6px 9px;font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.15);border-radius:var(--radius-sm);background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);cursor:pointer;text-align:left;transition:all .15s}
.tb-btn:hover{background:rgba(255,255,255,.18);color:#fff}
.auto-save-indicator{font-size:10px;color:#6ee7b7;margin-top:8px;text-align:center;font-weight:600;letter-spacing:.03em}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;color:var(--text3)}
.empty-icon{font-size:52px;opacity:.4}
.empty p{font-size:14px;font-weight:500}

/* ── PROFILE BAR ── */
.profile-bar{padding:20px 28px 18px;background:linear-gradient(135deg,#1e2248 0%,#2d3578 100%);display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:20;box-shadow:0 4px 24px rgba(30,34,72,.22)}
.photo{width:60px;height:60px;border-radius:50%;border:3px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;overflow:hidden;flex-shrink:0;cursor:pointer;transition:all .2s;color:#fff}
.photo:hover{border-color:#fff;box-shadow:0 0 0 4px rgba(255,255,255,.2)}
.photo img{width:100%;height:100%;object-fit:cover}
.p-info{flex:1}
.p-name{font-size:22px;font-weight:800;color:#fff;display:flex;align-items:center;gap:10px}
.p-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.04em}
.badge-교과{background:rgba(61,90,241,.7);color:#fff;border:1px solid rgba(255,255,255,.3)}
.badge-비교과{background:rgba(10,140,95,.7);color:#fff;border:1px solid rgba(255,255,255,.3)}
.p-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:5px;font-weight:500}
.edit-btn{font-size:12px;font-weight:600;padding:7px 16px;border-radius:var(--radius-sm);border:1.5px solid rgba(255,255,255,.35);background:rgba(255,255,255,.12);color:#fff;cursor:pointer;transition:all .15s}
.edit-btn:hover{background:rgba(255,255,255,.25);border-color:#fff}

/* ── CONTENT ── */
.content{padding:22px 28px 44px}
.sec{margin-bottom:26px}
.sec-title{font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;padding-bottom:7px;border-bottom:2px solid var(--accent-bg);display:flex;align-items:center;gap:6px}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ic{background:var(--surface);border-radius:var(--radius-sm);padding:12px 15px;border:1.5px solid var(--border);box-shadow:0 2px 8px rgba(61,90,241,.06)}
.ic-lbl{font-size:10px;color:var(--accent);margin-bottom:4px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.ic-val{font-size:14px;font-weight:600;color:var(--text)}
.ic.full{grid-column:1/-1}
.ic-val.green{color:var(--green-dark);font-weight:800;font-size:15px}

/* UNI TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1.5px solid var(--border);box-shadow:0 2px 12px rgba(61,90,241,.07)}
table.utbl{width:100%;border-collapse:collapse;font-size:12px}
table.utbl th{font-size:10px;font-weight:800;color:var(--accent);text-align:left;padding:9px 11px;background:var(--accent-bg);letter-spacing:.06em;border-bottom:1.5px solid var(--border)}
table.utbl td{padding:7px 9px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
table.utbl tr:last-child td{border-bottom:none}
table.utbl tr:hover td{background:#f5f7ff}
table.utbl td input,table.utbl td select{font-size:12px;padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);width:100%;font-family:inherit;transition:border-color .15s}
table.utbl td input:focus,table.utbl td select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,90,241,.12)}
.no-cell{width:32px;font-size:11px;color:var(--text3);text-align:center;font-weight:700}

/* COMPASS — 새 내신 나침반 */
.compass-wrap{display:flex;flex-direction:column;gap:16px}
.compass-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px 24px;box-shadow:0 4px 16px rgba(61,90,241,.09)}
.compass-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.compass-lbl{font-size:10px;font-weight:800;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.compass-avg-block{text-align:right}
.compass-avg-num{font-size:32px;font-weight:900;line-height:1;letter-spacing:-.02em}
.compass-avg-unit{font-size:13px;font-weight:700;color:var(--text2);margin-left:3px}
.compass-tier-name{font-size:13px;font-weight:800;margin-top:3px}
.compass-tier-sub{font-size:10px;color:var(--text3);margin-top:1px}
/* Gauge */
.gauge-outer{position:relative;padding-top:42px;margin:8px 0 16px}
.gauge-pointer{position:absolute;top:0;transform:translateX(-50%);transition:left .85s cubic-bezier(.34,1.15,.64,1);text-align:center;pointer-events:none;z-index:2}
.gauge-ptag{color:#fff;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:800;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.gauge-stem{width:2px;height:12px;margin:0 auto}
.gauge-caret{font-size:11px;margin-top:-3px;line-height:1}
.gauge-bar{display:flex;height:58px;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.gauge-seg{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:4px 2px;cursor:default;transition:opacity .35s,filter .35s;position:relative}
.gauge-seg+.gauge-seg::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:1.5px;background:rgba(255,255,255,.25)}
.gauge-seg.g-active{filter:brightness(1.12);z-index:1}
.gauge-seg.g-active::after{content:'';position:absolute;inset:0;border:2.5px solid rgba(255,255,255,.7);border-radius:0;pointer-events:none}
.gauge-seg.g-inactive{opacity:.38;filter:grayscale(.25)}
.gseg-name{font-size:10.5px;font-weight:800;color:#fff;text-align:center;line-height:1.25;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.gseg-range{font-size:8.5px;color:rgba(255,255,255,.82);margin-top:3px;text-align:center;font-weight:600}
/* Zone boxes */
.gz-row{display:flex;gap:10px}
.gz-box{flex:1;border-radius:var(--radius-sm);padding:10px 13px;border:1.5px solid transparent}
.gz-tl{font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.gz-val{font-size:11.5px;font-weight:700;line-height:1.55}
.gz-g{background:var(--green-bg);border-color:#9ae8c5}.gz-g .gz-tl{color:var(--green-dark)}.gz-g .gz-val{color:var(--green)}
.gz-b{background:var(--blue-bg);border-color:#90cef5}.gz-b .gz-tl{color:#0c4480}.gz-b .gz-val{color:var(--blue)}
.gz-a{background:var(--amber-bg);border-color:#f5ce70}.gz-a .gz-tl{color:#7a4800}.gz-a .gz-val{color:var(--amber)}
.gz-footer{display:flex;justify-content:flex-end;margin-top:10px}
.zone-edit-btn{margin-top:10px;width:100%;font-size:11px;font-weight:700;padding:7px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--accent-bg);color:var(--accent);cursor:pointer;transition:all .15s}
.zone-edit-btn:hover{background:var(--accent);color:#fff}

/* GRADE BARS */
.grade-right{display:flex;flex-direction:column;gap:10px}

/* NAESIN TABLE */
.tbl-wrap2{border-radius:var(--radius);border:1.5px solid var(--border);overflow:hidden;margin-top:12px;box-shadow:0 2px 10px rgba(61,90,241,.06)}
table.ntbl{width:100%;border-collapse:collapse;font-size:12px}
table.ntbl th{font-size:10px;font-weight:800;color:var(--accent);text-align:center;padding:8px 6px;background:var(--accent-bg);border-bottom:1.5px solid var(--border)}
table.ntbl th:first-child{text-align:left;padding-left:12px}
table.ntbl td{padding:6px 6px;border-bottom:1px solid var(--border);color:var(--text);text-align:center;vertical-align:middle}
table.ntbl tr:last-child td{border-bottom:none}
table.ntbl tr:hover td{background:#f5f7ff}
table.ntbl td:first-child{text-align:left;padding-left:12px}
.ni{font-size:12px;padding:4px 6px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);text-align:center;font-family:inherit;width:100%;transition:border-color .15s}
.ni:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,90,241,.1)}

/* MOCK EXAM */
.mock-subj-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.mock-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;box-shadow:0 3px 12px rgba(61,90,241,.08);transition:transform .15s}
.mock-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(61,90,241,.14)}
.mock-sname{font-size:10px;color:var(--accent);margin-bottom:6px;font-weight:800;letter-spacing:.06em}
.mock-score{font-size:26px;font-weight:800;color:var(--text)}
.mock-unit{font-size:11px;color:var(--text3);font-weight:600}
.mock-month-sel{font-size:13px;font-weight:700;padding:6px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer}
.mock-month-sel:focus{outline:none;border-color:var(--accent)}
.mock-head-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.mock-head-label{font-size:12px;color:var(--text2);font-weight:600}
table.htbl{width:100%;border-collapse:collapse;font-size:12px}
table.htbl th{font-size:10px;font-weight:800;color:var(--accent);text-align:center;padding:8px 5px;background:var(--accent-bg);border-bottom:1.5px solid var(--border)}
table.htbl td{padding:6px 5px;border-bottom:1px solid var(--border);color:var(--text);text-align:center}
table.htbl tr:last-child td{border-bottom:none}
table.htbl tr[onclick]:hover td{background:#eaedff;}
table.htbl tr[onclick]:hover{outline:1.5px solid var(--accent);}
table.htbl tr:hover td{background:#f5f7ff}
.hi{font-size:12px;padding:3px 5px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);text-align:center;font-family:inherit;width:46px}
.hi:focus{outline:none;border-color:var(--accent)}
.hi-sum{font-weight:800;color:var(--accent);font-size:13px}

/* EXTRA */
.extra-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(61,90,241,.06);transition:box-shadow .15s}
.extra-card:hover{box-shadow:0 4px 18px rgba(61,90,241,.12)}
.extra-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ex-type-badge{font-size:10px;font-weight:800;padding:4px 11px;border-radius:20px;letter-spacing:.04em}
.et-자율{background:var(--purple-bg);color:var(--purple)}
.et-진로{background:var(--green-bg);color:var(--green-dark)}
.et-동아리{background:var(--blue-bg);color:var(--blue)}
.et-봉사{background:var(--amber-bg);color:var(--amber)}
.ex-type-sel{font-size:11px;font-weight:600;padding:4px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:inherit}
.ex-year-inp{font-size:11px;font-weight:600;padding:4px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:72px;font-family:inherit}
.del-btn{margin-left:auto;background:none;border:none;cursor:pointer;font-size:14px;color:var(--text3);padding:3px 7px;border-radius:6px;transition:all .15s}
.del-btn:hover{color:var(--red);background:var(--red-bg)}
.extra-ta{width:100%;font-size:13px;padding:12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);resize:vertical;min-height:100px;font-family:inherit;line-height:1.8;transition:border-color .15s}
.extra-ta:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,90,241,.1)}
.byte-bar{display:flex;align-items:center;gap:10px;margin-top:8px}
.byte-bg{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.byte-fill{height:100%;border-radius:3px;background:var(--green);transition:width .3s}
.byte-lbl{font-size:11px;color:var(--text3);white-space:nowrap;font-weight:600}

/* SEBU */
.sebu-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(61,90,241,.06)}
.sebu-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sebu-inp{font-size:14px;font-weight:800;padding:5px 9px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:inherit;width:130px}
.sebu-year-inp{font-size:11px;font-weight:600;padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:72px;font-family:inherit}
.sebu-ta{width:100%;font-size:13px;padding:12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);resize:vertical;min-height:90px;font-family:inherit;line-height:1.8;transition:border-color .15s}
.sebu-ta:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,90,241,.1)}

/* BUTTONS */
.add-row-btn{width:100%;margin-top:10px;padding:8px;font-size:12px;font-weight:700;border:2px dashed var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--accent);cursor:pointer;transition:all .15s}
.add-row-btn:hover{border-color:var(--accent);background:var(--accent-bg)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(10,12,40,.5);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:24px 26px;width:370px;max-height:86vh;overflow-y:auto;box-shadow:0 24px 60px rgba(30,34,72,.22)}
.modal h3{font-size:17px;font-weight:800;margin-bottom:18px;color:var(--text)}
.f-row{margin-bottom:12px}
.f-lbl{font-size:11px;color:var(--accent);margin-bottom:5px;display:block;font-weight:800;letter-spacing:.04em}
.f-inp{width:100%;font-size:13px;font-weight:500;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:inherit;transition:all .15s}
.f-inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,90,241,.12)}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.btn-pri{flex:1;padding:10px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:800;cursor:pointer;transition:all .15s;letter-spacing:.02em}
.btn-pri:hover{background:var(--accent-dark);box-shadow:0 4px 14px rgba(61,90,241,.4)}
.btn-sec{flex:1;padding:10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-sec:hover{background:var(--surface2)}
.btn-del{flex:1;padding:10px;border-radius:var(--radius-sm);border:none;background:var(--red-bg);color:var(--red);font-size:13px;font-weight:800;cursor:pointer;border:1.5px solid #f5b0b0}
.btn-del:hover{background:var(--red);color:#fff}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1e2248;color:#fff;padding:11px 22px;border-radius:30px;font-size:13px;font-weight:700;z-index:2000;pointer-events:none;box-shadow:0 6px 24px rgba(30,34,72,.35);border:1px solid rgba(255,255,255,.15)}

/* ANALYSIS MODAL */
.amodal-bg{position:fixed;inset:0;background:rgba(10,12,40,.55);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(4px)}
.amodal{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);width:min(820px,96vw);max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(30,34,72,.28)}
.amodal-head{padding:18px 24px 14px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:linear-gradient(135deg,#1e2248,#2d3578)}
.amodal-head h3{font-size:16px;font-weight:800;color:#fff;flex:1}
.amodal-close{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:16px;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.amodal-close:hover{background:rgba(255,255,255,.3)}
.amodal-subj-tabs{display:flex;gap:0;flex-shrink:0;border-bottom:1.5px solid var(--border);overflow-x:auto}
.amodal-subj-tab{padding:10px 18px;font-size:12px;font-weight:800;cursor:pointer;border:none;background:transparent;color:var(--text3);border-bottom:3px solid transparent;margin-bottom:-1.5px;white-space:nowrap;transition:all .15s}

.amodal-body{padding:18px 22px;overflow-y:auto;flex:1}

.area-bar-wrap{flex:1;display:flex;flex-direction:column;gap:3px}

.area-wrong-pills{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}

.weak-summary{background:linear-gradient(135deg,#fff0f0,#fff8e1);border:1.5px solid #f5c0c0;border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}

const ANALYSIS_DATA={};

const COLORS=[
  {bg:'#dbeafe',color:'#1e40af'},{bg:'#dcfce7',color:'#166534'},
  {bg:'#ede9fe',color:'#5b21b6'},{bg:'#fce7f3',color:'#9d174d'},
  {bg:'#fef3c7',color:'#92400e'},{bg:'#e0f2fe',color:'#0c4a6e'},
  {bg:'#f3e8ff',color:'#6b21a8'},{bg:'#fef9c3',color:'#713f12'}

const EXAM_MONTHS=['3월','4월','5월','6월','7월','9월','10월','11월','대수능'];
const EXTRA_TYPES=['자율','진로','동아리','봉사'];
const MAIN_SUBJS=['국어','수학','영어','탐구1','탐구2'];

let students=[];
let activeId=null;
let activeTab={};
let openId=null;

const STORAGE_KEY='counseling_card_v1';

/* ─ PERSISTENCE ─ */
function saveToStorage(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({students,activeId,activeTab,openId}));
    const ind=document.getElementById('saveInd');
    if(ind){ind.textContent='● 저장됨';setTimeout(()=>{ind.textContent='● 자동저장 켜짐';},1200);}
  }catch(e){console.warn('저장 실패',e);}
}

function loadFromStorage(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return;
    const d=JSON.parse(raw);
    students=d.students||[];
    activeId=d.activeId||null;
    activeTab=d.activeTab||{};
    openId=d.openId||null;
  }catch(e){students=[];}
}

function exportJSON(){
  const blob=new Blob([JSON.stringify({students,activeId,activeTab,openId},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`상담카드_백업_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('JSON 백업 파일이 저장되었습니다');
}

function doImportJSON(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!Array.isArray(d.students))throw new Error('형식 오류');
      if(!confirm(`${d.students.length}명의 데이터를 불러올까요? 현재 데이터는 덮어씌워집니다.`))return;
      students=d.students;activeId=d.activeId||null;activeTab=d.activeTab||{};openId=d.openId||null;
      saveToStorage();renderSidebar();renderMain();
      showToast(`${students.length}명 데이터를 불러왔습니다`);
    }catch(err){alert('올바른 백업 파일이 아닙니다.');}
  };
  r.readAsText(f,'utf-8');
  ev.target.value='';
}

function doImportCSV(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){alert('데이터가 없습니다.');return;}
    // 헤더: 이름,반번호,학번,생년월일,연락처,보호자,출신중학교,희망진로,통학방법,주소
    const rows=lines.slice(1).map(l=>{
      const cols=l.split(',').map(c=>c.replace(/^"|"$/g,'').trim());
      return cols;
    }).filter(c=>c[0]);
    if(!confirm(`CSV에서 ${rows.length}명을 추가할까요?`))return;
    rows.forEach((cols,idx)=>{
      const id=Date.now()+idx;
      students.push({
        id,name:cols[0]||'',cls:cols[1]||'',hakbun:cols[2]||'',birth:cols[3]||'',
        phone:cols[4]||'',parent:cols[5]||'',middle:cols[6]||'',career:cols[7]||'',
        commute:cols[8]||'',addr:cols[9]||'',colorIdx:students.length,
        grades:{},unis:[{name:'',dept:'',type:'',min:'',result:''}],
        naesin:[],mockHist:[],mockSel:'3월',extras:[],sebus:[],zone:{g:'',b:'',a:''}
      });
    });
    saveToStorage();renderSidebar();renderMain();
    showToast(`${rows.length}명이 추가되었습니다`);
  };
  r.readAsText(f,'utf-8');
  ev.target.value='';
}

/* CSV 양식 다운로드 */
function downloadCSVTemplate(){
  const header='이름,반번호,학번,생년월일,연락처,보호자,출신중학교,희망진로,통학방법,주소\n';
  const example='홍길동,1학년 2반 7번,10207,2009-03-01,[PHONE_NUMBER],홍부(부),OO중학교,의사,버스,서울시 OO구\n';
  const blob=new Blob(['\uFEFF'+header+example],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='학생등록_양식.csv';
  a.click();
}

/* ─ SIDEBAR ─ */
function goToMock(hakbun) {
  // 구글시트 학번(3자리: 반+번호) → mock.html용 5자리(1+반2자리+번호2자리)
  // 예: 101 → 10101,  310 → 10310
  let mockHak = String(hakbun);
  if (mockHak.length === 3) {
    const cls = mockHak.slice(0, 1).padStart(2, '0');
    const num = mockHak.slice(1, 3);
    mockHak = '1' + cls + num;
  }
  location.href = 'mock.html?hakbun=' + mockHak;
}

function renderSidebar(){
  const el=document.getElementById('sbList');
  el.innerHTML='';
  students.forEach(s=>{
    const c=COLORS[s.colorIdx%COLORS.length];
    const isOpen=openId===s.id;
    const tab=activeTab[s.id]||'교과';
    const row=document.createElement('div');
    row.className='st-row'+(isOpen?' open':'');
    row.innerHTML=`
      <button class="st-btn${activeId===s.id?' active':''}" onclick="toggleStudent(${s.id})">
        <div class="av" style="background:${c.bg};color:${c.color};padding:0;overflow:hidden">${s.photo?`<img src="${s.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:`${s.name.slice(0,2)}`}</div>
        <div class="st-info">
          <div class="st-name">${s.name}</div>
          <div class="st-cls">${s.cls||''}</div>
        </div>
      </button>
      <div class="sub-tabs">
        <button class="stab${tab==='교과'?' sel-교과':''}" onclick="selectTab(${s.id},'교과')">📚 교과 영역</button>
        <button class="stab${tab==='비교과'?' sel-비교과':''}" onclick="selectTab(${s.id},'비교과')">🌱 비교과 영역</button>
      </div>`;
    el.appendChild(row);
  });
}

function toggleStudent(id){
  if(openId===id){openId=null;activeId=null;}
  else{openId=id;activeId=id;}
  renderSidebar();renderMain();
}
function selectTab(id,tab){
  activeId=id;openId=id;activeTab[id]=tab;
  renderSidebar();renderMain();
}

/* ─ MAIN ─ */
function renderMain(){
  const main=document.getElementById('mainArea');
  if(!activeId){
    main.innerHTML=`<div class="empty"><div class="empty-icon">🎓</div><p>왼쪽에서 학생을 선택하세요</p></div>`;
    return;
  }
  const s=students.find(x=>x.id===activeId);if(!s)return;
  const tab=activeTab[s.id]||'교과';
  const c=COLORS[s.colorIdx%COLORS.length];
  main.innerHTML=`
    <div class="profile-bar">
      <div class="photo" style="background:${c.bg};color:${c.color}" onclick="triggerPhoto(${s.id})" title="클릭하여 사진 변경">
        ${s.photo?`<img src="${s.photo}">`:`${s.name.slice(0,2)}`}
      </div>
      <input type="file" id="pi${s.id}" accept="image/*" style="display:none" onchange="handlePhoto(event,${s.id})">
      <div class="p-info">
        <div class="p-name">${s.name}<span class="p-badge badge-${tab}">${tab} 영역</span></div>
        <div class="p-sub">${s.cls||'반 미지정'} · ${s.birth||'생년월일 미입력'} · 희망 진로: ${s.career||'미정'}</div>
      </div>
      <button class="edit-btn" onclick="openEditModal(${s.id})">편집</button>
    </div>
    <div class="content" id="tabContent"></div>`;
  document.getElementById('tabContent').innerHTML=tab==='교과'?buildGwagwa(s):buildBigwagwa(s);
  requestAnimationFrame(()=>drawUniGauge(s));
}

function buildMockDetail(s,month){
  const r=(s.mockHist||[]).find(x=>x.month===month)||{};
  // 6과목 카드: 국어·수학·영어 (원점수+등급+백분위) + 한국사·사회·과학 (원점수+등급)
  const cards=[
    {name:'국어',  gKey:'kor',  sKey:'korScore',  pKey:'korP',  color:'#ef4444'},
    {name:'수학',  gKey:'math', sKey:'mathScore', pKey:'mathP', color:'#3b82f6'},
    {name:'영어',  gKey:'eng',  sKey:'engScore',  pKey:null,    color:'#10b981'},
    {name:'한국사',gKey:null,   sKey:'hisScore',  pKey:null,    color:'#f59e0b'},
    {name:'사회',  gKey:'ex1',  sKey:'socScore',  pKey:'socP',  color:'#8b5cf6'},
    {name:'과학',  gKey:'ex2',  sKey:'sciScore',  pKey:'sciP',  color:'#06b6d4'},
  ];
  const t3=r.t3;
  const gradeColor=g=>g<=2?'#7c3aed':g<=4?'#2563eb':g<=6?'#16a34a':g<=8?'#ea580c':'#dc2626';

  return `
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px">
    ${cards.map(c=>{
      const g=c.gKey?r[c.gKey]:'';
      const score=r[c.sKey]!==undefined?r[c.sKey]:'';
      const pct=c.pKey&&r[c.pKey]!==undefined?r[c.pKey]:'';
      const gc=g?gradeColor(parseInt(g)):'var(--text3)';
      return `<div style="background:var(--surface);border:2px solid ${c.color}30;border-radius:var(--radius);padding:10px 8px;text-align:center;box-shadow:var(--shadow-sm)">
        <div style="font-size:9px;font-weight:800;color:${c.color};letter-spacing:.06em;margin-bottom:6px">${c.name}</div>
        <div style="font-size:20px;font-weight:800;color:var(--text)">${score!==''?score:'—'}</div>
        <div style="font-size:9px;color:var(--text3);margin-bottom:4px">원점수</div>
        ${g?`<div style="display:inline-block;background:${gc};color:#fff;font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px">${g}등급</div>`:'<div style="font-size:10px;color:var(--text3)">등급 미입력</div>'}
        ${pct!==''?`<div style="font-size:10px;color:${c.color};font-weight:700;margin-top:3px">백분위 ${pct}%</div>`:''}
      </div>`;
    }).join('')}
  </div>
  ${t3?`<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--accent-bg);border-radius:var(--radius-sm);border:1.5px solid var(--border)">
    <span style="font-size:12px;font-weight:700;color:var(--text2)">국·수·영 3합</span>
    <span style="font-size:22px;font-weight:800;color:${t3<=6?'#7c3aed':t3<=9?'#2563eb':t3<=12?'#0891b2':t3<=15?'#16a34a':'#dc2626'}">${t3}</span>
    <span style="font-size:11px;color:var(--text3)">${t3<=6?'최상위권':t3<=9?'상위권':t3<=12?'중상위권':t3<=15?'중위권':'하위권'}</span>
    <div style="flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">
      <div style="height:100%;border-radius:3px;background:${t3<=6?'#7c3aed':t3<=9?'#2563eb':t3<=12?'#0891b2':t3<=15?'#16a34a':'#dc2626'};width:${Math.round((1-(t3-3)/21)*100)}%"></div>
    </div>
  </div>`:''}`;
}

/* ─ 내신 나침반 (단위수 가중평균 → 대학 라인 게이지) ─ */
const TIERS=[
  {idx:0,name:'SKY',          sub:'서울대·연세대·고려대',        color:'#4f46e5', segMin:0,  segMax:20},
  {idx:1,name:'서성한·중경외시', sub:'서강·성균관·한양·중앙·경희·외대·시립대', color:'#2563eb', segMin:20, segMax:40},
  {idx:2,name:'건동홍',        sub:'건국·동국·홍익대',            color:'#16a34a', segMin:40, segMax:60},
  {idx:3,name:'경북대',        sub:'경북대학교',                  color:'#ca8a04', segMin:60, segMax:80},
  {idx:4,name:'영남·계명',     sub:'영남대·계명대',               color:'#dc2626', segMin:80, segMax:100},
];

function calcAvgGrade(s){
  const rows=(s.naesin||[]).filter(r=>r.grade&&r.unit&&parseFloat(r.unit)>0&&parseFloat(r.grade)>0);
  if(!rows.length)return null;
  const sumUG=rows.reduce((a,r)=>a+parseFloat(r.grade)*parseFloat(r.unit),0);
  const sumU =rows.reduce((a,r)=>a+parseFloat(r.unit),0);
  return sumU>0?sumUG/sumU:null;
}

function getTierIdx(avg){
  if(avg===null)return -1;
  if(avg<=1.00)return 0;
  if(avg<=1.15)return 1;
  if(avg<=1.35)return 2;
  if(avg<=1.75)return 3;
  return 4;
}

function getPointerPct(avg){
  /* 각 티어 구간 → 게이지 위 20%씩 선형 매핑 */
  const segs=[
    {min:1.00,max:1.00,sMin:0, sMax:20},
    {min:1.01,max:1.15,sMin:20,sMax:40},
    {min:1.16,max:1.35,sMin:40,sMax:60},
    {min:1.36,max:1.75,sMin:60,sMax:80},
    {min:1.76,max:3.00,sMin:80,sMax:100},
  ];
  const c=Math.max(1.00,Math.min(3.00,avg));
  const s=c<=1.00?segs[0]:c<=1.15?segs[1]:c<=1.35?segs[2]:c<=1.75?segs[3]:segs[4];
  if(s.max===s.min)return(s.sMin+s.sMax)/2;
  return s.sMin+(c-s.min)/(s.max-s.min)*(s.sMax-s.sMin);
}

function drawUniGauge(s){
  const avg=calcAvgGrade(s);
  const ti=getTierIdx(avg);
  const tier=TIERS[ti]||null;

  /* 평균등급 표시 */
  const gEl=document.getElementById('cGrade');
  const zEl=document.getElementById('cZone');
  const subEl=document.getElementById('cTierSub');
  if(gEl){
    gEl.textContent=avg!==null?avg.toFixed(2):'—';
    gEl.style.color=tier?tier.color:'var(--text)';
  }
  if(zEl)zEl.style.color=tier?tier.color:'var(--text3)';
  if(zEl)zEl.textContent=tier?tier.name+' 라인':'내신 기록 입력 시 표시';
  if(subEl)subEl.textContent=tier?tier.sub:'';

  /* 포인터 */
  const ptr=document.getElementById('gaugePointer');
  const badge=document.getElementById('gaugeBadge');
  const stem=document.getElementById('gaugeStem');
  const caret=document.getElementById('gaugeCaret');
  if(ptr){
    if(avg!==null&&tier){
      ptr.style.display='block';
      const pct=getPointerPct(avg);
      setTimeout(()=>{ ptr.style.left=pct+'%'; },60);
      if(badge){badge.textContent=avg.toFixed(2)+'등급';badge.style.background=tier.color;}
      if(stem)stem.style.background=tier.color;
      if(caret)caret.style.color=tier.color;
    } else {
      ptr.style.display='none';
    }
  }

  /* 세그먼트 강조 */
  document.querySelectorAll('.gauge-seg').forEach(seg=>{
    const si=parseInt(seg.dataset.tier||'-1');
    seg.classList.remove('g-active','g-inactive');
    if(avg===null)return;
    if(si===ti)seg.classList.add('g-active');
    else seg.classList.add('g-inactive');
  });

  /* 안정권/적정권/도전권 (s.zone 수동 입력 우선) */
  const z=s.zone||{};
  const zg=document.getElementById('zg');
  const zb=document.getElementById('zb');
  const za=document.getElementById('za');
  if(zg)zg.textContent=z.g||(ti>=0&&ti<4?TIERS[ti+1].name+' ('+TIERS[ti+1].sub+')':'—');
  if(zb)zb.textContent=z.b||(ti>=0?TIERS[ti].name+' ('+TIERS[ti].sub+')':'—');
  if(za)za.textContent=z.a||(ti>0?TIERS[ti-1].name+' ('+TIERS[ti-1].sub+')':ti===0?'최상위권':'—');
}

function updUni(id,i,k,v){const s=students.find(x=>x.id===id);if(!s.unis[i])s.unis[i]={};s.unis[i][k]=v;}
function updNaesin(id,i,k,v){
  const s=students.find(x=>x.id===id);
  if(!s.naesin[i])s.naesin[i]={};
  s.naesin[i][k]=v;
  drawUniGauge(s);
  saveToStorage();
}
function updMock(id,i,k,v){
  const s=students.find(x=>x.id===id);
  if(!s.mockHist[i])s.mockHist[i]={};
  s.mockHist[i][k]=v;
  const row=document.getElementById('mockHistTbody').rows[i];

function switchAnalysisSubj(subj){
  _aModalSubj=subj;
  document.querySelectorAll('.amodal-subj-tab').forEach(t=>t.classList.remove('active'));
  const tab=document.getElementById('atab_'+subj);
  if(tab)tab.classList.add('active');
  renderAnalysisBody(_aModalSid, subj);
}

function renderAnalysisBody(sid, subj){
  const body=document.getElementById('amodalBody');
  if(!body)return;
  const areas=ANALYSIS_DATA[sid]?.[subj];
  if(!areas){body.innerHTML='<p style="color:var(--text3);padding:20px">데이터 없음</p>';return;}

  const color=SUBJ_COLORS[subj]||'#3d5af1';

  // 약점·강점 요약
  const sorted=[...areas].sort((a,b)=>a.rate-b.rate);
  const weak=sorted.filter(a=>a.rate<70&&a.wrong.length>0);
  const strong=sorted.filter(a=>a.rate===100).reverse();

  // 대단원 그룹핑
  const groups={};
  areas.forEach(a=>{
    if(!groups[a.major])groups[a.major]=[];
    groups[a.major].push(a);
  });

  const weakHTML=weak.length?`
    <div class="weak-summary">
      <div class="weak-summary-title">⚠ 집중 보완 필요 영역 (정답률 70% 미만)</div>
      <div>${weak.map(a=>`<span class="weak-tag">${a.major} · ${a.minor} ${a.rate}%</span>`).join('')}</div>
    </div>`:'';

  const strongHTML=strong.length?`
    <div class="strong-summary">
      <div class="strong-summary-title">✓ 완벽 정복 영역 (100%)</div>
      <div>${strong.map(a=>`<span class="strong-tag">${a.major} · ${a.minor}</span>`).join('')}</div>
    </div>`:'';

  const groupsHTML=Object.entries(groups).map(([major, areaList])=>`
    <div class="area-group">
      <div class="area-group-title">${major}</div>
      <div class="area-rows">
        ${areaList.map(a=>{
          const barColor=a.rate>=80?color:a.rate>=50?'#f59e0b':'#ef4444';
          const wrongPills=a.wrong.map(n=>`<span class="wrong-pill">${n}번</span>`).join('');
          const allCorrect=a.rate===100;
          return `<div class="area-row" style="${a.rate<50?'border-color:#f5c0c0;background:#fff8f8':a.rate===100?'border-color:var(--green-light);background:#f0fdf7':''}">
            <div class="area-name">${a.minor}</div>
            <div class="area-bar-wrap">
              <div class="area-bar-bg"><div class="area-bar-fill" style="width:${a.rate}%;background:${barColor}"></div></div>
              <div class="area-wrong-pills">
                ${allCorrect
                  ? `<span class="correct-pill">전문항 정답 ✓</span>`
                  : wrongPills||''}
              </div>
            </div>
            <div class="area-rate" style="color:${barColor}">${a.rate}%</div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');

  body.innerHTML=weakHTML+strongHTML+groupsHTML;
}

// ── API에서 학생 데이터 로드 ──────────────────
async function loadStudentsFromAPI() {
  showToast('구글 시트에서 데이터 불러오는 중...');
  try {
    // 담임이면 자기 반만, 학년부장/관리자면 전체
    const t = _teacher || {};
    const clsParam = (t.isHomeroom && !t.isGradeHead && !t.isAdmin)
      ? `&cls=${t.cls}` : '';

    const allRes  = await fetch(`${API_URL}?action=getAllCounsel&activeOnly=true${clsParam}`);
    const allData = await allRes.json();

    const stuData     = { success: allData.success, students:  allData.students  || [] };
    const mockData    = { success: allData.success, scores:    allData.scores    || [] };
    const counselData = { success: allData.success, records:   allData.counseling || [] };
    const univData    = { success: allData.success, records:   allData.university || [] };

    if (!stuData.success) throw new Error('학생 데이터 로드 실패');

    // 기존 INIT_STUDENTS 형식으로 변환
    const scoreMap = {};
    if (mockData.success) {
      mockData.scores.forEach(s => {
        if (!scoreMap[s['학번']]) scoreMap[s['학번']] = [];
        scoreMap[s['학번']].push({
          year:  '2026',
          month: s['시험회차'],
          kor:   s['국어_등급']   || '',
          math:  s['수학_등급']   || '',
          eng:   s['영어_등급']   || '',
          ex1:   s['탐구1_등급']  || '',
          ex2:   s['탐구2_등급']  || '',
          korScore:  parseFloat(s['국어_원점수'])  || 0,
          mathScore: parseFloat(s['수학_원점수'])  || 0,
          engScore:  parseFloat(s['영어_원점수'])  || 0,
          hisScore:  parseFloat(s['한국사_원점수'])|| 0,
          socScore:  parseFloat(s['탐구1_원점수']) || 0,
          sciScore:  parseFloat(s['탐구2_원점수']) || 0,
          korP:  parseFloat(s['국어_백분위'])   || 0,
          mathP: parseFloat(s['수학_백분위'])   || 0,
          socP:  parseFloat(s['탐구1_백분위'])  || 0,
          sciP:  parseFloat(s['탐구2_백분위'])  || 0,
          t3: (parseInt(s['국어_등급']||9)+parseInt(s['수학_등급']||9)+parseInt(s['영어_등급']||9))
        });
      });
    }

    const counselMap = {};
    if (counselData.success) {
      counselData.records.forEach(r => {
        if (!counselMap[r['학번']]) counselMap[r['학번']] = [];
        counselMap[r['학번']].push(r);
      });
    }

    const univMap = {};
    if (univData.success) {
      univData.records.forEach(r => {
        if (!univMap[r['학번']]) univMap[r['학번']] = [];
        univMap[r['학번']].push({
          name: r['대학명']||'', dept: r['학과명']||'',
          type: r['전형유형']||'', min: r['수능최저기준']||'',
          result: r['결과']||''
        });
      });
    }

    students = stuData.students.map((stu, i) => {
      const hakbun = String(stu['학번']);
      const clsNum = parseInt(stu['반']);
      const numNum = parseInt(stu['번호']);
      const mocks  = scoreMap[hakbun] || [];
      const univs  = univMap[hakbun]  || [{name:'',dept:'',type:'',min:'',result:''}];
      const counsels = counselMap[hakbun] || [];

      return {
        id:       i + 1,
        name:     stu['이름'] || '',
        cls:      `1학년 ${clsNum}반 ${numNum}번`,
        hakbun:   hakbun,
        birth:    '',
        phone:    '',
        parent:   '',
        middle:   stu['비고'] || '',
        career:   '',
        commute:  '',
        addr:     '',
        colorIdx: i % 28,
        photo:    null,
        hobby:    '',
        middle_grade: '0',
        good_subj: '', bad_subj: '', strategy: '',
        siblings: '', many_child: false,
        rural:    stu['농어촌전형'] === 'O' ? '예' : '아니오',
        rural_type: '',
        grades:   {},
        unis:     univs,
        naesin:   [],
        mockHist: mocks,
        mockSel:  mocks.length > 0 ? mocks[mocks.length-1].month : '3월',
        extras:   [],
        sebus:    [],
        zone:     {g:'',b:'',a:''},
        _counsels: counsels  // 상담 기록 별도 보관
      };
    });

    renderSidebar();
    renderMain();
    showToast(`✅ ${students.length}명 데이터 로드 완료`);

    // URL 파라미터로 학생 자동선택 (mock.html에서 넘어온 경우)
    const urlHakbun = new URLSearchParams(window.location.search).get('hakbun');
    if (urlHakbun) {
      const found = students.find(s => s.hakbun === urlHakbun || String(s.hakbun) === String(urlHakbun));
      if (found) {
        activeId = found.id;
        openId = found.id;
        renderSidebar();
        renderMain();
        setTimeout(() => {
          const el = document.querySelector('.student-card, .main-card, #mainContent');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 200);
      }
    }

  } catch(err) {
    console.error('API 로드 실패:', err);
    showToast('⚠️ 구글 시트 연결 실패: ' + err.message);
    // 로컬 스토리지 폴백
    loadFromStorage();
    if (!students || students.length === 0) {
      students = INIT_STUDENTS.map((s,i) => Object.assign({
        grades:{}, unis:[{name:'',dept:'',type:'',min:'',result:''}],
        naesin:[], mockHist:[], mockSel:'3월', extras:[], sebus:[],
        zone:{g:'',b:'',a:''}
      }, s, {photo: null}));
      saveToStorage();
    }
    renderSidebar();
    renderMain();
  }
}

  if (!el || !_teacher) return;
  const t = _teacher;
  const label = t.isAdmin?'관리자':t.isGradeHead?'학년부장':t.isHomeroom?`${t.cls}반 담임`:'열람';
  el.textContent = (_user?.name||_user?.email||'') + ' · ' + label;
});

// ── API에 상담 기록 저장 ──
async function saveCounselToAPI(studentId, counselData) {
  const stu = students.find(s => s.id === studentId);
  if (!stu) return;
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        action: 'saveCounseling',
        hakbun: stu.hakbun,
        '상담일자': counselData.date || new Date().toISOString().slice(0,10),
        '상담유형': counselData.type || '기타',
        '상담내용': counselData.content || '',
        '후속조치': counselData.follow || '',
        '담당교사': _user?.name || _user?.email || ''
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    console.log('상담 기록 API 저장 완료');
  } catch(err) {
    console.warn('API 저장 실패 (로컬만 저장됨):', err.message);
  }
}

// ── API에 희망대학 저장 ──
async function saveUnivToAPI(studentId) {
  const stu = students.find(s => s.id === studentId);
  if (!stu) return;
  try {
    for (let i = 0; i < stu.unis.length; i++) {
      const u = stu.unis[i];
      if (!u.name) continue;
      await fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          action: 'saveUniversity',
          hakbun: stu.hakbun,
          '순위': i + 1,
          '대학명': u.name,
          '학과명': u.dept,
          '전형유형': u.type,
          '수능최저기준': u.min,
          '결과': u.result
        })
      });
    }
    console.log('희망대학 API 저장 완료');
  } catch(err) {
    console.warn('희망대학 API 저장 실패:', err.message);
  }
}
